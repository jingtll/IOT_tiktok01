<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>

<body>
  <div id="app">
    <!-- 插值表达式 -->
    <p>{{title}}</p>
    <p>{{content}}</p>
  </div>
  <script src="./vue.min.js"></script>
  <script>
    //1.响应式数据与插值表达式
    const vm = new Vue({
      el: '#app',
      data() {
        return {
          title: '这是标题内容文本',
          content: '这是内容文本'
        }
      }
    })
  </script>

</body>

</html>
