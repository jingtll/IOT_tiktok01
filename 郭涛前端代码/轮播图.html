<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>轮播图示例</title>
    <style>
        /* 基础样式重置 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* 轮播图容器 */
        .carousel-container {
            position: relative;
            width: 100%;
            height: 500px;
            /* 可根据需要调整高度 */
            overflow: hidden;
        }

        /* 轮播图列表 */
        .carousel-list {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            transition: transform 0.5s ease-in-out;
            /* 平滑过渡效果 */
        }

        /* 轮播项 */
        .carousel-item {
            min-width: 100%;
            height: 100%;
            background-position: center;
            background-size: cover;
            background-repeat: no-repeat;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            text-align: center;
        }

        /* 左右控制按钮 */
        .carousel-control {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background-color: rgba(0, 0, 0, 0.3);
            color: white;
            border: none;
            font-size: 24px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background-color 0.3s;
            z-index: 10;
        }

        .carousel-control:hover {
            background-color: rgba(0, 0, 0, 0.5);
        }

        .prev {
            left: 20px;
        }

        .next {
            right: 20px;
        }

        /* 指示器容器 */
        .carousel-indicators {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            z-index: 10;
        }

        /* 指示器 */
        .indicator {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background-color: rgba(255, 255, 255, 0.5);
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .indicator.active {
            background-color: white;
            width: 30px;
            border-radius: 6px;
        }

        /* 轮播内容样式 */
        .carousel-content {
            max-width: 800px;
            padding: 20px;
        }

        .carousel-title {
            font-size: 36px;
            margin-bottom: 15px;
        }

        .carousel-subtitle {
            font-size: 20px;
            margin-bottom: 30px;
            letter-spacing: 2px;
        }

        .carousel-button {
            padding: 12px 30px;
            background-color: #e60000;
            color: white;
            border: none;
            font-size: 16px;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .carousel-button:hover {
            background-color: #c00000;
        }
    </style>
</head>

<body>
    <!-- 轮播图容器 -->
    <div class="carousel-container">
        <!-- 轮播图列表 -->
        <div class="carousel-list">
            <!-- 轮播项1 -->
            <div class="carousel-item"
                style="background-image: url('https://p26-flow-imagex-download-sign.byteimg.com/tos-cn-i-a9rns2rl98/efa4019a3ad94003a0dfc4bb7a5fabee.png~tplv-a9rns2rl98-24-95-exif:960:960.png')">
                <div class="carousel-content">
                    <h2 class="carousel-title">华为Mate80系列 | Mate X7</h2>
                    <p class="carousel-subtitle">及 全 场 景 新 品 发 布 会</p>
                    <p>2025年11月25日 14:30</p>
                    <button class="carousel-button">了解更多</button>
                </div>
            </div>

            <!-- 轮播项2 -->
            <div class="carousel-item" style="background-image: url('https://picsum.photos/id/2/1920/1080')">
                <div class="carousel-content">
                    <h2 class="carousel-title">华为P90系列</h2>
                    <p class="carousel-subtitle">超感光影像，重新定义手机摄影</p>
                    <button class="carousel-button">探索更多</button>
                </div>
            </div>

            <!-- 轮播项3 -->
            <div class="carousel-item" style="background-image: url('https://picsum.photos/id/3/1920/1080')">
                <div class="carousel-content">
                    <h2 class="carousel-title">华为平板MatePad Pro</h2>
                    <p class="carousel-subtitle">生产力与创造力的完美结合</p>
                    <button class="carousel-button">立即购买</button>
                </div>
            </div>
        </div>

        <!-- 左右控制按钮 -->
        <button class="carousel-control prev">&lt;</button>
        <button class="carousel-control next">&gt;</button>

        <!-- 指示器 -->
        <div class="carousel-indicators">
            <!-- 指示器会通过JS动态生成 -->
        </div>
    </div>

    <script>
        // 获取DOM元素
        const carouselContainer = document.querySelector('.carousel-container');
        const carouselList = document.querySelector('.carousel-list');
        const carouselItems = document.querySelectorAll('.carousel-item');
        const prevBtn = document.querySelector('.prev');
        const nextBtn = document.querySelector('.next');
        const indicatorsContainer = document.querySelector('.carousel-indicators');

        // 轮播图配置
        let currentIndex = 0;
        const itemCount = carouselItems.length;
        let interval;
        const intervalTime = 5000; // 自动播放间隔时间(毫秒)

        // 初始化指示器
        function initIndicators() {
            for (let i = 0; i < itemCount; i++) {
                const indicator = document.createElement('div');
                indicator.classList.add('indicator');
                if (i === currentIndex) {
                    indicator.classList.add('active');
                }
                // 点击指示器切换轮播
                indicator.addEventListener('click', () => {
                    goToSlide(i);
                    resetInterval();
                });
                indicatorsContainer.appendChild(indicator);
            }
        }

        // 切换到指定轮播项
        function goToSlide(index) {
            currentIndex = index;
            // 处理边界情况
            if (currentIndex < 0) {
                currentIndex = itemCount - 1;
            } else if (currentIndex >= itemCount) {
                currentIndex = 0;
            }

            // 移动轮播列表
            const offset = -currentIndex * 100;
            carouselList.style.transform = `translateX(${offset}%)`;

            // 更新指示器状态
            updateIndicators();
        }

        // 更新指示器状态
        function updateIndicators() {
            const indicators = document.querySelectorAll('.indicator');
            indicators.forEach((indicator, index) => {
                if (index === currentIndex) {
                    indicator.classList.add('active');
                } else {
                    indicator.classList.remove('active');
                }
            });
        }

        // 下一张
        function nextSlide() {
            goToSlide(currentIndex + 1);
        }

        // 上一张
        function prevSlide() {
            goToSlide(currentIndex - 1);
        }

        // 初始化自动播放
        function startInterval() {
            interval = setInterval(nextSlide, intervalTime);
        }

        // 重置自动播放计时器
        function resetInterval() {
            clearInterval(interval);
            startInterval();
        }

        // 绑定事件监听
        function bindEvents() {
            // 左右按钮点击事件
            prevBtn.addEventListener('click', () => {
                prevSlide();
                resetInterval();
            });

            nextBtn.addEventListener('click', () => {
                nextSlide();
                resetInterval();
            });

            // 鼠标悬停暂停自动播放
            carouselContainer.addEventListener('mouseenter', () => {
                clearInterval(interval);
            });

            // 鼠标离开继续自动播放
            carouselContainer.addEventListener('mouseleave', () => {
                startInterval();
            });

            // 键盘左右键控制
            document.addEventListener('keydown', (e) => {
                if (e.key === 'ArrowLeft') {
                    prevSlide();
                    resetInterval();
                } else if (e.key === 'ArrowRight') {
                    nextSlide();
                    resetInterval();
                }
            });
        }

        // 初始化轮播图
        function initCarousel() {
            initIndicators();
            bindEvents();
            startInterval();
        }

        // 页面加载完成后初始化
        window.addEventListener('load', initCarousel);
    </script>
</body>

</html>
