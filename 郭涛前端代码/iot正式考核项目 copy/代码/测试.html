<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>极简验证：图标+伪元素竖线</title>
    <!-- 替换成你自己的iconfont.css路径！！！（这是关键） -->
    <link rel="stylesheet" href="../neewsfton/iconfont.css">
    <style>
        /* 重置默认样式 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        /* 页脚容器（极简版） */
        .iot_footer-container {
            background-color: whitesmoke;
            padding: 20px;
            height: 200px; /* 简化高度，方便查看 */
        }
        /* 页脚导航（极简flex布局） */
        .iot_footer-nav {
            position: relative;
            display: flex;
            align-items: center;
            gap: 20px; /* 元素间距，避免挤在一起 */
            height: 100px;
            border-bottom: 1px solid #ccc; /* 临时简化分割线，先验证核心 */
        }
        /* 首页文字 */
        .iot_footer-title {
            margin-left: 50px; /* 简化间距，避免305px超出屏幕 */
            color: #595757;
        }
        /* 搜索输入框 */
        .iot_footer-input {
            flex: 0 0 300px; /* 固定宽度，不挤压 */
            height: 48px;
            padding: 0 20px 0 50px; /* 左侧留空间，右侧给图标 */
            border: 1px solid #d4d4d4;
            outline: none;
            font-size: 16px;
        }
        /* 搜索图标（核心：绝对定位在输入框右侧，确保可见） */
        #iot_footer-fontResearch {
            position: relative; /* 伪元素定位参考 */
            font-size: 30px;
            color: #d4d4d4;
            cursor: pointer;
            padding-left: 12px; /* 给左侧竖线留空间 */
            z-index: 2; /* 图标层级最高 */
            /* 强制加载iconfont字体（解决图标不显示的核心！） */
            font-family: "iconfont" !important;
            font-style: normal;
            -webkit-font-smoothing: antialiased;
        }
        /* 图标前的竖线（伪元素） */
        #iot_footer-fontResearch::before {
            content: "";
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 1px;
            height: 20px;
            background-color: #d4d4d4; /* 竖线颜色 */
            z-index: 1; /* 低于图标，不遮挡 */
        }
    </style>
</head>
<body>
    <div class="iot_footer-container">
        <div class="iot_footer-nav">
            <span class="iot_footer-title">首页</span>
            <input class="iot_footer-input" type="text" placeholder="搜索huawei.com">
            <!-- 关键：手动写图标content（如果iconfont类没生效，直接写编码） -->
            <span id="iot_footer-fontResearch" class="iconfont" style="content: '\e600';">&#xe600;</span>
            <!-- 替换&#xe600;为你搜索图标的Unicode编码！！！ -->
        </div>
    </div>
</body>
</html>
