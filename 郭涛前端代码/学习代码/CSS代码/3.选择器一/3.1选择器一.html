<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /* 全局选择器 */
        /* 作为初始化 */
        *{
            font-size: 30px;
            color: red;
        }
        /* 元素选择器 */
        p{
            color: green;
        }
        span{
            color: black;
        }
    </style>
</head>
<body>
    <h1>css的选择器一</h1>
    <p>加油学习吧</p>
    <p>原神大佬</p>
    <p>学完<span>css</span>，就学js</p>
</body>
</html>
