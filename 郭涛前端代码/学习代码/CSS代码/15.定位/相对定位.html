<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!-- 相对定位是标准流 -->
    <style>
        .box1{
            height: 300px;
            width: 300px;
            background-color: aqua;
            position: relative;
            top: 100px;
            left: 100px;
        }
        .box2{
            width: 200px;
            height: 200px;
            background-color: red;
        }
        .box3{
            width: 200px;
            height: 200px;
            background-color: green;
            position: relative;
            left: 100px;
            top: 100px;
        }
    </style>

</head>
<body>
    <div class="box1"></div>
    <div class="box2"></div>
    <div class="box3"></div>
    
</body>
</html>
