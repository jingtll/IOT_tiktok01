<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box4{
            width: 300px;
            height: 300px;
            background-color: red;
            position: fixed;
            /* 固定定位会脱离文档流 */
            /* 页面滚动而位置不变 */
            right: 100px;
            bottom: 100px;
        }
        .box1{
            width: 300px;
            height: 300px;
            background-color: darkgreen;
            position: fixed;
            /* 固定定位会脱离文档流 */
            /* 页面滚动而位置不变 */
            right: 100px;
            bottom: 50px;
        }
        .box2{
            width: 200px;
            height: 200px;
            background-color: blue;
        }
        .box3{
            width: 200px;
            height: 200px;
            background-color: green;
            position: absolute;
            left: 100px;
            top: 100px;
        }
        h3{
            height: 500px;
        }
    </style>
</head>
<body>
    <div class="box1"></div>
    <div class="box2"></div>
    <div class="box3"></div>
    <div class="box4"></div>
    <h3>hah</h3>
    <h3>hah</h3>
    <h3>hah</h3>
    <h3>hah</h3>
    <h3>hah</h3>
    <h3>hah</h3>
    
</body>
</html>
