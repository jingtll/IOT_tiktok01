<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box1 {
            width: 300px;
            height: 300px;
            background-color: red;
            position: absolute;
            /* 绝对定位会脱离文档流 */
            /* 只在一个位置 */
            left: 100px;
            top: 100px;
            z-index: 100;
            /* 调整覆盖的顺序，否则为下面的覆盖上面的 */
        }


        .box3 {
            width: 200px;
            height: 400px;
            background-color: green;
            position: absolute;
            left: 150px;
            top: 100px;
            z-index: 20;
        }
    </style>
</head>

<body>
    <div class="box1"></div>

    <div class="box3"></div>

</body>

</html>
