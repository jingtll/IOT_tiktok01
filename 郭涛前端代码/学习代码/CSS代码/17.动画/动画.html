<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box{
            height: 300px;
            width: 300px;
            background-color: red;
            animation: anim 3s linear 0s 5  ;
        }
        .box:hover{
            background-color: chocolate;
            animation-play-state: paused;
        }
        @keyframes anim{
            0%{
                width: 400px;
                background-color: red;
            }
            50%{
                width: 500px;
                background-color: blue;
            }
            100%{
                width: 600px;
                background-color: yellow;
            }
        }
    </style>
</head>
<body>
    <div class="box"></div>
    
</body>
</html>
