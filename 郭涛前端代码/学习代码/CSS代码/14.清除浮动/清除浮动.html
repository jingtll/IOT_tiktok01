<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container {
            width: 500px;

            background-color: aqua;

        }

        .container::after {
            content: " ";
            display: block;
            clear: both;
        }

        .box {
            width: 100px;
            height: 100px;
            background-color: red;
            margin: 2px;
            float: left;
        }

        .text {
            width: 200px;
            height: 200px;
            background-color: green;
            clear: both;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
        <div class="text"></div>


    </div>

</body>

</html>
