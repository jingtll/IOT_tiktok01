<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">

    <title>28表单-提交与重置</title>
</head>

<body>
    <form action="https://search.jd.com/search" target="_blank">
        <!-- 文本输入框 -->
        账户：<input type="text" name="account" value="原神" maxlength="4"><br>
        <!-- 密码输入框 -->
        密码：<input type="password" name="pwd" maxlength="4"><br>
        <!-- 单选框 -->
        性别：
        <input type="radio" name="gender" value="male" checked>男
        <input type="radio" name="gender" value="female">女<br>

        <!-- 多选框 -->
        爱好
        <input type="checkbox" name="hobby" value="sing" checked>唱
        <input type="checkbox" name="hobby" value="dance">跳
        <input type="checkbox" name="hobby" value="rap">rap
        <input type="checkbox" name="hobby" value="basketball" checked>篮球
        <!-- 隐藏域 -->
        <input type="hidden" name="from" value="toutiao">
        <br>
        <!-- 确认第一种写法 -->
        <button>确认</button>
        <!-- 确认第二种写法 -->
        <input type="submit" value="确认">
        <!--重置-第一种写法  -->
        <button type="reset">重置</button>
        <!--重置-第二种写法  -->
        <input type="reset" value="点我重置">

    </form>

</body>

</html>
