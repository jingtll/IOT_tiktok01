<!DOCTYPE html>
<html lang="zh-CN">
<head>
	<meta charset="UTF-8">
	<title>36.全局属性</title>
</head>
<body>
	<div title="英雄联盟">LOL</div>
	<a href="https://www.baidu.com" title="百度">去百度</a>
	<!-- 设置字符编码 -->
	<meta charset="utf-8">
	<!-- 针对移动端的配置 -->
	<meta name="viewport" content="width=device-width, initial=1.0">
	<!-- 配置网页关键字 -->
	<meta name="keywords" content="网上购物,电商购物">
	<!-- 网页描述信息 -->
	<meta name="description" content="xxxxxxxxxxxxx">
	<!-- 自动刷新-->
	<meta http-equiv="refresh" content="3;ur1=https://www.baidu.com">
</body>
</html>
