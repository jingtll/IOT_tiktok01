<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            margin: 0;
            padding: 0;
        }

        body {
            margin: 10px;

        }

        div {
            width: 100px;
            height: 100px;
            border: 1px dashed #ccc;
            margin-bottom: 10px;
        }

        .changeStyle {
            width: 80px;
            height: 80px;
            background-color: tomato;

        }

        .bold-text {
            font-size: 20px;
            font-weight: 10px;
        }

        #carousel {
            width: 200px;
            height: 200px;
            position: relative;
        }

        #carousel li {
            width: 200px;
            line-height: 200px;
            position: absolute;
            text-align: center;
            text-shadow: 0 0 5px #000;
            font-size: 35px;
            color: #fff;
            opacity: 0;
            transition: opacity 1s;
        }

        #carousel li:nth-child(1) {
            background-color: orange;
        }

        #carousel li:nth-child(2) {
            background-color: gold;
        }

        #carousel li:nth-child(3) {
            background-color: brown;
        }

        #carousel li:nth-child(4) {
            background-color: grey;
        }

        #carousel li.active {
            opacity: 1;

        }
    </style>
</head>

<body>
    <div id="block">默认内容</div>
    <ul id="carousel">
        <li class="active">huawei</li>
        <li>iphone</li>
        <li>xiaomi</li>
        <li>oppo</li>
    </ul>
    <button id="prev">上一张</button>
    <button id="next">下一张</button>
    <script>
        var block = document.querySelector('#block')
        // block.style.width="80px"
        // block.style.height='80px'
        // block.style.backgroundColor="tomato"
        block.className = 'changeStyle'
        block.innerHTML = '普通内容<span class="bold-text">加粗的文本</span>'
        // block.onclick=function(){
        //     alert('surprise')
        // }
        block.addEventListener("click", function () {
            alert('surprise')
        })

        block.addEventListener("click", function () {
            alert('surprise again')
        })
        //轮播图
        var carousel = document.querySelector("#carousel")
        var items = carousel.children
        console.log(items)
        var prevBtn = document.querySelector('#prev')
        var nextBtn = document.querySelector('#next')
        var index = 0
        nextBtn.addEventListener('click', function () {
            items[index].className = ""
            if (index === items.length - 1) {
                index = -1
            }
            index++
            items[index].className = 'active'

        })
        prevBtn.addEventListener('click', function () {
            items[index].className = ""
            if (index === 0) {
                index = items.length
            }
            index--
            items[index].className = 'active'

        })
        //定时器
        //只输出一次
        // setTimeout(function(){
        //     alert('yuanshen')
        // },2000)
        //间隔定时器
        var timer = setInterval(function () {
            console.log("每间隔两秒输出一次")
        }, 2000)
        setTimeout(function () {
            clearInterval(timer)
        }, 10000)
        setInterval(function () {
            items[index].className = ""
            if (index === items.length - 1) {
                index = -1
            }
            index++
            items[index].className = 'active'

        },1500)
    </script>

</body>

</html>
