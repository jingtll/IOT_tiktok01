<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>华为风格顶部导航栏</title>
    <style>
        /* 基础重置 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft Yahei", sans-serif;
        }

        /* 导航栏容器 */
        .top-nav {
            display: flex;
            align-items: center;
            height: 60px; /* 导航栏高度 */
            background-color: #fff; /* 背景白色 */
            border-top: 2px solid #000; /* 顶部黑边 */
            border-bottom: 2px solid #000; /* 底部黑边 */
            padding: 0 20px; /* 左右内边距 */
        }

        /* 华为Logo区域 */
        .nav-logo {
            display: flex;
            align-items: center;
            gap: 8px; /* Logo和文字间距 */
            cursor: pointer;
        }
        .nav-logo img {
            width: 40px; /* Logo宽度 */
            height: auto;
        }
        .nav-logo span {
            font-size: 18px;
            font-weight: bold;
            color: #000;
        }

        /* 导航链接区域（居中） */
        .nav-links {
            display: flex;
            list-style: none;
            gap: 40px; /* 导航项之间的间距 */
            margin: 0 auto; /* 让链接区域居中 */
        }
        .nav-links a {
            text-decoration: none;
            color: #333; /* 文字默认颜色 */
            font-size: 14px;
            transition: color 0.2s; /*  hover过渡效果 */
        }
        .nav-links a:hover {
            color: #0066cc; /* hover时变蓝色（华为品牌色） */
        }

        /* 右侧图标区域 */
        .nav-icons {
            display: flex;
            gap: 20px; /* 图标之间的间距 */
            font-size: 18px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <!-- 顶部导航栏 -->
    <nav class="top-nav">
        <!-- Logo区域 -->
        <div class="nav-logo">
            <!-- 替换为华为Logo的实际地址（可从华为官网获取） -->
            <img src="https://www.huawei.com/cn/images/logo.png" alt="华为Logo">
            <span>HUAWEI</span>
        </div>

        <!-- 导航链接 -->
        <ul class="nav-links">
            <li><a href="#">个人及家庭产品</a></li>
            <li><a href="#">商用产品及方案</a></li>
            <li><a href="#">服务支持</a></li>
            <li><a href="#">合作伙伴与开发者</a></li>
            <li><a href="#">关于华为</a></li>
        </ul>

        <!-- 右侧图标（购物袋+搜索） -->
        <div class="nav-icons">
            <span>🛒</span> <!-- 购物袋图标（也可用SVG） -->
            <span>🔍</span> <!-- 搜索图标（也可用SVG） -->
        </div>
    </nav>
</body>
</html>
